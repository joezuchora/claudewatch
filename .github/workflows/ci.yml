name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bun run tsc --noEmit

      - name: Run tests
        run: bun test

      - name: Build core
        run: bun run --filter @claudewatch/core build

      - name: Build VS Code extension
        run: bun run --filter claudewatch-vscode build
