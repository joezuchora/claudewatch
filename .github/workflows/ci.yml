name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bun run tsc --noEmit

      - name: Test core
        run: bun test packages/core/

      - name: Test statusline
        run: bun test packages/statusline/

      - name: Test vscode
        run: bun test packages/vscode/

      - name: Build core
        run: bun run --filter @claudewatch/core build

      - name: Build statusline
        run: bun run --filter @claudewatch/statusline build

      - name: Build VS Code extension
        run: bun run --filter claudewatch-vscode build
